    /* Página de artículo: reutiliza los estilos del modal aplicados como página */
    .article-page-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 6rem 2rem 4rem;
    }

    .article-back {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .8rem;
      letter-spacing: .06em;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color .2s;
    }

    .article-back:hover {
      color: var(--bright);
    }

    .article-error {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .article-error h2 {
      color: var(--bright);
      margin-bottom: 1rem;
    }

    @media (max-width: 600px) {
      .article-page-wrap {
        padding: 5rem 1.2rem 3rem;
      }
    }
  </style>
